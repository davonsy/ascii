<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASCII Atmospheric Renderer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="stage" aria-label="ASCII atmospheric renderer">
        <div class="topbar">
          <div>
            <p class="eyebrow">volumetric ASCII signal</p>
            <h1>Atmospheric Renderer</h1>
          </div>
          <div class="actions">
            <button id="exportSvg" type="button" disabled>SVG</button>
            <button id="exportPng" type="button" disabled>PNG</button>
            <button id="exportPngHi" type="button" disabled>4K PNG</button>
          </div>
        </div>

        <div id="dropzone" class="dropzone" tabindex="0">
          <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp" />
          <div id="emptyState" class="empty-state">
            <span class="mark">·</span>
            <p>drop an image</p>
            <small>png · jpg · webp</small>
          </div>
          <div id="renderMount" class="render-mount" aria-live="polite"></div>
        </div>
      </section>

      <aside class="controls" aria-label="Render controls">
        <div class="control-group">
          <label for="density">particle density <span id="densityValue"></span></label>
          <input id="density" type="range" min="0.12" max="1.35" step="0.01" value="0.36" />
        </div>
        <div class="control-group">
          <label for="asciiSize">ASCII size <span id="asciiSizeValue"></span></label>
          <input id="asciiSize" type="range" min="4" max="16" step="0.5" value="7" />
        </div>
        <div class="control-group">
          <label for="diffusion">particle diffusion <span id="diffusionValue"></span></label>
          <input id="diffusion" type="range" min="0" max="1" step="0.01" value="0.46" />
        </div>
        <div class="control-group">
          <label for="dissolve">silhouette dissolve <span id="dissolveValue"></span></label>
          <input id="dissolve" type="range" min="0" max="1" step="0.01" value="0.42" />
        </div>
        <div class="control-group">
          <label for="threshold">brightness threshold <span id="thresholdValue"></span></label>
          <input id="threshold" type="range" min="0.18" max="0.88" step="0.01" value="0.58" />
        </div>
        <div class="control-group">
          <label for="spread">volumetric spread <span id="spreadValue"></span></label>
          <input id="spread" type="range" min="0" max="1" step="0.01" value="0.54" />
        </div>
        <div class="control-group">
          <label for="bloom">bloom intensity <span id="bloomValue"></span></label>
          <input id="bloom" type="range" min="0" max="1" step="0.01" value="0.32" />
        </div>
        <div class="control-group">
          <label for="scanlines">scanline strength <span id="scanlinesValue"></span></label>
          <input id="scanlines" type="range" min="0" max="0.55" step="0.01" value="0.14" />
        </div>
        <div class="control-group">
          <label for="palette">color palette</label>
          <select id="palette">
            <option value="veil">mint veil</option>
            <option value="ember">warm apparition</option>
            <option value="cyan">faint cyan</option>
            <option value="rose">pale rose</option>
          </select>
        </div>
      </aside>
    </main>
    <canvas id="analysisCanvas" hidden></canvas>
    <script src="./app.js"></script>
  </body>
</html>
